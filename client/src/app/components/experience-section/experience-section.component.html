<article class="panel panel-full reveal-on-scroll" id="experience">
  <button
    class="card-edit-btn"
    *ngIf="showEditTools"
    type="button"
    (click)="editRequested.emit()"
    aria-label="Edit experience"
    style="position: absolute; top: 18px; right: 18px; left: auto; z-index: 2;">
    &#9998;
  </button>
  <div class="section-header">
    <div>
      <p class="section-tag">Experience</p>
      <h2>{{ profile.sectionTitles.experience }}</h2>
    </div>
  </div>
  <div class="timeline">
    <div class="timeline-item" *ngFor="let item of profile.experience">
      <div class="timeline-head">
        <div>
          <h3>{{ item.role }}</h3>
          <p class="timeline-company">{{ item.company }}</p>
        </div>
        <span class="timeline-period">{{ item.period }}</span>
      </div>
      <ul class="experience-points">
        <li *ngFor="let point of getExperienceBulletPoints(item.description)">{{ point }}</li>
      </ul>
    </div>
  </div>
</article>
