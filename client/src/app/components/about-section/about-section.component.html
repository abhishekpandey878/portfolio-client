<article class="panel panel-full about-panel reveal-on-scroll">
  <button
    class="card-edit-btn about-edit-btn"
    *ngIf="showEditTools"
    type="button"
    (click)="editRequested.emit()"
    aria-label="Edit about"
    style="position: absolute; top: 18px; right: 18px; left: auto; z-index: 2;">
    &#9998;
  </button>
  <div class="section-header">
    <div>
      <p class="section-tag">About</p>
      <h2>{{ profile.sectionTitles.about }}</h2>
    </div>
  </div>
  <div class="about-layout">
    <div class="about-summary">
      <p>{{ profile.summary }}</p>
    </div>
    <div class="highlights-grid">
      <div class="highlight-card" *ngFor="let item of profile.highlights">
        <span class="highlight-dot"></span>
        <p>{{ item }}</p>
      </div>
    </div>
  </div>
</article>
