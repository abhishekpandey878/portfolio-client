<article class="panel panel-half reveal-on-scroll" id="skills">
  <button
    class="card-edit-btn"
    *ngIf="showEditTools"
    type="button"
    (click)="editRequested.emit()"
    aria-label="Edit skills"
    style="position: absolute; top: 18px; right: 18px; left: auto; z-index: 2;">
    &#9998;
  </button>
  <div class="section-header compact-header">
    <div>
      <p class="section-tag">Skills</p>
      <h2>{{ profile.sectionTitles.skills }}</h2>
    </div>
  </div>
  <div class="skills-grid">
    <div class="skill-card" *ngFor="let skill of profile.skills">
      <img [src]="getSkillIcon(skill)" [alt]="skill + ' logo'" />
      <span>{{ skill }}</span>
    </div>
  </div>
</article>
